name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov flake8 pylint

      - name: Lint (flake8)
        run: python -m flake8 mural_poller.py service

      - name: Lint (pylint)
        run: python -m pylint mural_poller.py

      - name: Run tests
        run: python -m pytest tests/ -v --cov=mural_poller --cov-branch --cov-fail-under=100

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download info-beamer SDK files
        run: |
          curl -fsSL -o hosted.lua https://raw.githubusercontent.com/info-beamer/package-sdk/master/hosted.lua
          curl -fsSL -o hosted.py  https://raw.githubusercontent.com/info-beamer/package-sdk/master/hosted.py

      - name: Fix line endings on service file
        run: sed -i 's/\r$//' service

      - name: Validate required files
        run: |
          missing=0
          for f in package.json package.png node.json node.lua service \
                   hosted.lua hosted.py mural_poller.py default.webp README.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Build zip
        run: |
          zip storyfield-mural-display.zip \
            package.json package.png node.json node.lua service \
            hosted.lua hosted.py mural_poller.py default.webp README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: storyfield-mural-display.zip
