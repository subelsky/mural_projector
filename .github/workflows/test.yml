name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov flake8 pylint

      - name: Lint (JSON)
        run: python -m json.tool package.json > /dev/null && python -m json.tool node.json > /dev/null

      - name: Lint (flake8)
        run: python -m flake8 mural_poller.py service

      - name: Lint (pylint)
        run: python -m pylint mural_poller.py

      - name: Run tests
        run: python -m pytest tests/ -v --cov=mural_poller --cov-branch --cov-fail-under=100
